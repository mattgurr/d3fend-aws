name: Validate and Build

on:
  push:
    paths:
      - "data/**"
      - "catalog/**"
      - "schema/**"
      - "scripts/**"
  pull_request:
    paths:
      - "data/**"
      - "catalog/**"
      - "schema/**"
      - "scripts/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Validate technique YAML files
        run: uv run --with pyyaml --with jsonschema python scripts/validate.py

      - name: Build matrix page
        run: uv run --with pyyaml python scripts/build-matrix.py

      - name: Upload matrix artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
