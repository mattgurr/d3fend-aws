id: D3FA-HD-0003
name: Security Group Least Privilege
tactic: harden
category: Platform Hardening
description: >
  Restrict security group rules to minimum required ports, protocols, and
  source ranges. Remove overly permissive inbound rules (e.g. 0.0.0.0/0 on
  management ports) and enforce least-privilege network access.
