id: D3FA-HD-0001
name: SCP Preventive Controls
tactic: harden
category: Access Control
description: >
  Apply Service Control Policies at the AWS Organizations level to enforce
  preventive guardrails that restrict dangerous actions such as disabling
  CloudTrail, modifying GuardDuty, or leaving the organization. SCPs act
  as a permissions boundary that no IAM principal in a member account can
  exceed.
aws_services:
  - AWS Organizations
