id: D3FA-HD-0014
name: AMI and Snapshot Protection
tactic: harden
category: Platform Hardening
description: >
  Apply tag-based resource policies and SCPs to restrict AMI deregistration
  and snapshot deletion. Use Recycle Bin for EBS snapshots and AMIs to enable
  recovery of accidentally or maliciously deleted images.
