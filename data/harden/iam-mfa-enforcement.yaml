id: D3FA-HD-0002
name: IAM MFA Enforcement
tactic: harden
category: Credential Hardening
description: >
  Enforce multi-factor authentication for IAM users, especially for
  privileged operations and console access. Apply IAM policies that deny
  actions unless MFA is present in the request context. Require hardware
  or virtual MFA for the root user.
aws_services:
  - AWS IAM
counters:
