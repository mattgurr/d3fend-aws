id: D3FA-DT-0002
name: GuardDuty Threat Detection
tactic: detect
category: Threat Detection
description: >
  Use Amazon GuardDuty to continuously monitor for malicious activity and
  anomalous behavior across AWS accounts. GuardDuty analyzes CloudTrail
  management and data events, VPC Flow Logs, and DNS logs to identify
  threats such as credential compromise, instance compromise, and
  unauthorized access.
aws_services:
  - Amazon GuardDuty
counters:
