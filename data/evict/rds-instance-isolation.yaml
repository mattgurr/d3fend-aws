id: D3FA-EV-0006
name: RDS Instance Isolation
tactic: evict
category: Resource Eviction
description: >
  Isolate a compromised RDS instance by modifying its security group to deny
  all inbound connections, disabling public accessibility, and taking a final
  snapshot for forensics. Prevents ongoing data access or destruction while
  preserving evidence.
aws_services:
  - Amazon RDS
  - Amazon VPC
