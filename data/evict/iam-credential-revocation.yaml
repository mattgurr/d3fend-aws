id: D3FA-EV-0001
name: IAM Credential Revocation
tactic: evict
category: Credential Eviction
description: >
  Deactivate or delete compromised IAM access keys, invalidate active
  sessions by applying a revoke-all-sessions inline policy, and reset
  console passwords. This is a primary containment action during credential
  compromise incidents to immediately cut off adversary access.
aws_services:
  - AWS IAM
