id: D3FA-EV-0009
name: Compute Resource Termination
tactic: evict
category: Resource Eviction
description: >
  Terminate or stop unauthorized compute resources being used for
  cryptomining, resource hijacking, or other abuse. Includes EC2 instances,
  ECS tasks, and WorkSpaces that were launched or compromised by an
  adversary.
