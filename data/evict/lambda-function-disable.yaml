id: D3FA-EV-0004
name: Lambda Function Disable
tactic: evict
category: Resource Eviction
description: >
  Disable a compromised or malicious Lambda function by setting its reserved
  concurrency to zero, removing event source mappings, or deleting the
  function. Prevents further serverless execution while preserving
  configuration for investigation.
aws_services:
  - AWS Lambda
counters:
